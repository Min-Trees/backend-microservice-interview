spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/userservice
    username: postgres
    password: 123456
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: http://discovery-service:8761/eureka

jwt:
  secret: "ChangeThisSecretKeyToASecureOne1234567890"
  access-token-expiration: 3600000
  refresh-token-expiration: 604800000
